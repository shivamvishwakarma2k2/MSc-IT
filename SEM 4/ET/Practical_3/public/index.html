<!doctype html>
<html>
    <head>
        <title>6409 - Log Analyzer</title>
    </head>
    <body>
        <h2>Upload a Log File</h2>
        
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="logFile" accept=".log" required />
            <button type="submit">Upload & Analyze</button>
        </form>
    </body>
</html>
